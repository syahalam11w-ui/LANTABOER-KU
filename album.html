<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album - PPDB MTs Lantaboer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#2563eb; --primary-dark:#1d4ed8; --primary-light:#60a5fa;
            --bg:#f8fafc; --bg-card:#fff; --text:#1e293b; --text-muted:#64748b;
            --border:#e2e8f0; --shadow:0 4px 6px -1px rgb(0 0 0/0.1); --radius:16px; --radius-lg:24px; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
        
        /* Navigation (same) */
        .menu-toggle{position:fixed;top:20px;left:20px;width:52px;height:52px;
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));
            border-radius:16px;display:flex;justify-content:center;align-items:center;
            cursor:pointer;box-shadow:0 10px 15px -3px rgb(0 0 0/0.1);z-index:1000;transition:all 0.3s;border:none}
        .menu-toggle:hover{transform:scale(1.08) translateY(-2px)}
        .menu-toggle svg{width:24px;height:24px;fill:white}
        .sidebar{position:fixed;top:0;left:-320px;width:320px;height:100vh;
            background:linear-gradient(180deg,var(--primary-dark),var(--primary));
            color:white;padding:90px 24px 24px;transition:left 0.4s;z-index:999}
        .sidebar.active{left:0}
        .sidebar-header{text-align:center;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.15);margin-bottom:24px}
        .sidebar-logo{width:72px;height:72px;border-radius:20px;border:3px solid rgba(255,255,255,0.9);margin:0 auto 12px;object-fit:cover;background:#fff;padding:4px}
        .sidebar-title{font-size:1.25rem;font-weight:700}
        .sidebar-subtitle{font-size:0.9rem;opacity:0.9}
        .nav-links{list-style:none}
        .nav-links li{margin-bottom:6px}
        .nav-links a{display:flex;align-items:center;padding:14px 18px;color:rgba(255,255,255,0.95);
            text-decoration:none;border-radius:12px;transition:all 0.2s;font-weight:500}
        .nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,0.15);transform:translateX(6px);color:white}
        .nav-links a.active{background:rgba(255,255,255,0.25)}
        .nav-links svg{width:20px;height:20px;margin-right:14px;fill:currentColor}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);
            backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:all 0.3s;z-index:998}
        .overlay.active{opacity:1;visibility:visible}
        
        header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),#0ea5e9);
            color:white;padding:100px 20px 50px;text-align:center}
        .header-logo{width:110px;height:110px;border-radius:24px;border:4px solid rgba(255,255,255,0.95);
            margin:0 auto 20px;object-fit:cover;background:#fff;padding:6px}
        .header-title{font-size:1.8rem;font-weight:800;margin-bottom:8px}
        .header-subtitle{font-size:1.1rem;opacity:0.98}
        
        .container{max-width:1200px;margin:0 auto;padding:40px 24px}
        .album-section{background:var(--bg-card);border-radius:var(--radius-lg);padding:32px;
            box-shadow:0 10px 15px -3px rgb(0 0 0/0.1);border:1px solid var(--border)}        .section-title{color:var(--primary-dark);font-size:1.35rem;font-weight:700;margin-bottom:22px;
            padding-bottom:14px;border-bottom:3px solid var(--primary-light);
            display:flex;align-items:center;gap:12px}
        .section-title svg{width:24px;height:24px;fill:var(--primary)}
        
        .photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px}
        .photo-card{background:var(--bg);border-radius:16px;overflow:hidden;
            box-shadow:var(--shadow);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);cursor:pointer;border:1px solid var(--border)}
        .photo-card:hover{transform:translateY(-6px);box-shadow:0 20px 25px -5px rgb(0 0 0/0.15);border-color:var(--primary-light)}
        .photo-image{width:100%;height:200px;object-fit:cover;background:linear-gradient(135deg,#dbeafe,#bfdbfe);
            display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:3rem}
        .photo-image img{width:100%;height:100%;object-fit:cover}
        .photo-info{padding:18px}
        .photo-title{font-weight:700;color:var(--primary-dark);margin-bottom:6px;font-size:1.05rem}
        .photo-desc{font-size:0.92rem;color:var(--text-muted);line-height:1.5}
        
        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);grid-column:1/-1}
        .empty-state svg{width:80px;height:80px;fill:#cbd5e1;margin-bottom:18px}
        
        /* Lightbox */
        .lightbox{position:fixed;top:0;left:0;width:100%;height:100%;
            background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
            display:none;justify-content:center;align-items:center;z-index:2000;padding:20px}
        .lightbox.active{display:flex}
        .lightbox-content{max-width:95%;max-height:90%;background:white;
            border-radius:20px;overflow:hidden;box-shadow:0 25px 50px -12px rgb(0 0 0/0.4);
            animation:lightboxIn 0.3s ease}
        @keyframes lightboxIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
        .lightbox-img{max-width:100%;max-height:70vh;object-fit:contain;display:block;background:#f8fafc}
        .lightbox-info{padding:22px 24px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0)}
        .lightbox-title{font-weight:700;color:var(--primary-dark);font-size:1.2rem;margin-bottom:6px}
        .lightbox-desc{color:var(--text-muted);font-size:0.95rem;line-height:1.6}
        .lightbox-close{position:absolute;top:25px;right:30px;color:white;font-size:2.5rem;
            cursor:pointer;background:none;border:none;line-height:1;transition:transform 0.2s}
        .lightbox-close:hover{transform:scale(1.2)}
        
        footer{background:linear-gradient(135deg,var(--primary-dark),var(--primary));
            color:white;text-align:center;padding:35px 24px 25px;margin-top:50px}
        .footer-logo{width:64px;height:64px;border-radius:18px;border:2px solid rgba(255,255,255,0.9);
            margin:0 auto 14px;object-fit:cover;background:#fff;padding:4px}
        .footer-text{opacity:0.95;font-size:1rem;line-height:1.7}
        .footer-text strong{font-weight:600;display:block;margin-bottom:4px}
        .copyright{margin-top:18px;font-size:0.9rem;opacity:0.85}
        
        @media(max-width:768px){
            .header-title{font-size:1.5rem}
            .photos-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
            .lightbox-close{top:15px;right:20px;font-size:2rem}
        }
    </style></head>
<body>
    <button class="menu-toggle" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://image2url.com/r2/default/images/1772641298988-6972016f-93d3-4f00-8535-b8c2ac728fb1.jpg" class="sidebar-logo" onerror="this.src='https://via.placeholder.com/72/3b82f6/ffffff?text=MTs'">
            <div class="sidebar-title">MTs LANTABOER</div><div class="sidebar-subtitle">PPDB 2026/2027</div>
        </div>
        <ul class="nav-links">
            <li><a href="home.html"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Beranda</a></li>
            <li><a href="daftar.html"><svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>Daftar</a></li>
            <li><a href="komentar.html"><svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>Komentar</a></li>
            <li><a href="album.html" class="active"><svg viewBox="0 0 24 24"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>Album</a></li>
            <li><a href="admin.html"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>Admin</a></li>
        </ul>
    </nav>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <header>
        <img src="https://image2url.com/r2/default/images/1772641298988-6972016f-93d3-4f00-8535-b8c2ac728fb1.jpg" class="header-logo" onerror="this.src='https://via.placeholder.com/110/3b82f6/ffffff?text=MTs'">
        <h1 class="header-title">📸 Album Kegiatan</h1>
        <p class="header-subtitle">Dokumentasi aktivitas MTs Lantaboer</p>
    </header>
    
    <div class="container">
        <div class="album-section">
            <h2 class="section-title">
                <svg viewBox="0 0 24 24"><path d="M22 16V4c0-1.1-.9-2-2-2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2zm-11-4l2.03 2.71L16 11l4 5H8l3-4zM2 6v14c0 1.1.9 2 2 2h14v-2H4V6H2z"/></svg>
                Galeri Foto
            </h2>
            <div class="photos-grid" id="photosGrid">
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18zM18 14H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                    <p>Belum ada foto. Admin akan menambahkan segera! 📷</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">&times;</button>
        <div class="lightbox-content">
            <img src="" alt="Preview" class="lightbox-img" id="lightboxImg">
            <div class="lightbox-info">
                <div class="lightbox-title" id="lightboxTitle"></div>
                <div class="lightbox-desc" id="lightboxDesc"></div>
            </div>
        </div>
    </div>    
    <footer>
        <img src="https://image2url.com/r2/default/images/1772641298988-6972016f-93d3-4f00-8535-b8c2ac728fb1.jpg" class="footer-logo" onerror="this.src='https://via.placeholder.com/64/3b82f6/ffffff?text=MTs'">
        <p class="footer-text"><strong>MTsS LAN TABOER</strong><br>Jl. Marzuki IV, Penggilingan, Cakung<br>Jakarta Timur</p>
        <p class="copyright">© 2026 MTs Lantaboer</p>
    </footer>
    
    <script type="module">
        import { db } from './config.js'
        
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active')
            document.getElementById('overlay').classList.toggle('active')
        }
        window.toggleMenu = toggleMenu
        
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('active')
                document.getElementById('overlay').classList.remove('active')
            })
        })
        
        // Load photos from Supabase
        async function loadPhotos() {
            try {
                const photos = await db.getPhotos()
                const grid = document.getElementById('photosGrid')
                const empty = document.getElementById('emptyState')
                
                if(photos.length === 0) { empty.style.display = 'block'; return }
                empty.style.display = 'none'
                
                grid.innerHTML = photos.map(p => `
                    <div class="photo-card" onclick="openLightbox('${escapeHtml(p.image_url)}', '${escapeHtml(p.title)}', '${escapeHtml(p.description || '')}')">
                        <div class="photo-image">
                            <img src="${escapeHtml(p.image_url)}" alt="${escapeHtml(p.title)}" 
                                 onerror="this.parentElement.innerHTML='📷'">
                        </div>
                        <div class="photo-info">
                            <div class="photo-title">${escapeHtml(p.title)}</div>
                            <div class="photo-desc">${escapeHtml(p.description || 'Tidak ada deskripsi')}</div>
                        </div>
                    </div>
                `).join('')
            } catch(err) {
                console.error('Error loading photos:', err)
                document.getElementById('emptyState').innerHTML = '<p style="color:#ef4444">⚠️ Gagal memuat foto</p>'
            }
        }        
        // Lightbox functions
        window.openLightbox = function(imgSrc, title, desc) {
            document.getElementById('lightboxImg').src = imgSrc
            document.getElementById('lightboxTitle').textContent = title
            document.getElementById('lightboxDesc').textContent = desc || 'Tidak ada deskripsi'
            document.getElementById('lightbox').classList.add('active')
            document.body.style.overflow = 'hidden'
        }
        
        window.closeLightbox = function(e) {
            if(e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
                document.getElementById('lightbox').classList.remove('active')
                document.body.style.overflow = ''
            }
        }
        
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') {
                document.getElementById('lightbox').classList.remove('active')
                document.body.style.overflow = ''
            }
        })
        
        function escapeHtml(text) {
            if(!text) return ''
            const div = document.createElement('div')
            div.textContent = text
            return div.innerHTML.replace(/'/g, "\\'")
        }
        
        // Initialize
        loadPhotos()
    </script>
</body>
</html>
