<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - PPDB MTs Lantaboer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }
        
        .loading-container {
            text-align: center;
            animation: fadeIn 0.8s ease-in;
            padding: 20px;
        }
        
        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.9);
            box-shadow: 0 0 40px rgba(255,255,255,0.4), 0 0 80px rgba(59,130,246,0.5);
            margin-bottom: 25px;
            animation: pulse 2s infinite, float 3s ease-in-out infinite;
            object-fit: cover;
            background: #fff;
            padding: 5px;
        }
        
        .school-name {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        
        .school-subtitle {
            font-size: 0.95rem;            opacity: 0.95;
            margin-bottom: 20px;
            font-weight: 300;
        }
        
        .loading-text {
            font-size: 1.1rem;
            opacity: 0.95;
            margin-bottom: 25px;
            font-weight: 500;
        }
        
        .loader {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(255,255,255,0.25);
            border-top: 4px solid #fff;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        
        .progress-bar {
            width: 220px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin: 0 auto;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fff, #93c5fd);
            border-radius: 4px;
            animation: progress 2.5s ease-in-out forwards;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .footer-text {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 25px;
            font-weight: 400;
        }
        
        .dots {
            display: inline-flex;            gap: 4px;
            margin-left: 3px;
        }
        .dots span {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dots span:nth-child(1) { animation-delay: -0.32s; }
        .dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="glass loading-container">
        <img src="https://image2url.com/r2/default/images/1772641298988-6972016f-93d3-4f00-8535-b8c2ac728fb1.jpg" 
             alt="Logo MTs Lantaboer" class="logo" 
             onerror="this.src='https://via.placeholder.com/140/3b82f6/ffffff?text=MTs'">
        <div class="school-name">MTs LANTABOER</div>
        <div class="school-subtitle">Madrasah Tsanawiyah Swasta • Jakarta Timur</div>
        <div class="loading-text">Memuat Website PPDB<span class="dots"><span></span><span></span><span></span></span></div>
        <div class="loader"></div>
        <div class="progress-bar"><div class="progress"></div></div>
        <div class="footer-text">✨ Penerimaan Peserta Didik Baru 2026/2027</div>
    </div>

    <script>
        setTimeout(() => { window.location.href = 'home.html'; }, 2800);
    </script>
</body>
</html>
